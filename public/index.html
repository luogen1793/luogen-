<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>罗根AI - 私有全栈版</title>
    <style>
:root {
    --bg-primary: #f0f4ff;
    --bg-secondary: #ffffffcc;
    --bg-chat: #f0f4ff;
    --bg-bubble-user: linear-gradient(145deg, #7b61ff, #5a40e0);
    --bg-bubble-ai: #ffffffdd;
    --text-primary: #1d1d1f;
    --text-secondary: #64748b;
    --text-white: #ffffff;
    --border-color: rgba(255,255,255,0.25);
    --shadow-light: 0 6px 24px rgba(123, 97, 255, 0.12);
    --accent-primary: #7b61ff;
    --radius-small: 12px;
    --radius-medium: 22px;
    --radius-xlarge: 40px;
    --radius-round: 50%;
}
[data-theme="dark"] {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293bcc;
    --bg-chat: #0f172a;
    --bg-bubble-user: linear-gradient(145deg, #8b70ff, #6b4de0);
    --bg-bubble-ai: #273444dd;
    --text-primary: #f5f5f7;
    --text-secondary: #94a3b8;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
}
#app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
}
.top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg-secondary);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-color);
}
.logo-circle {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-round);
    background: linear-gradient(145deg, #7b61ff, #5a40e0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}
.ai-nickname {
    font-size: 18px;
    font-weight: 600;
}
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
}
.chat-container::-webkit-scrollbar {display: none;}
.chat-messages {
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.message {
    display: flex;
    gap: 12px;
    max-width: 85%;
}
.message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
}
.message.ai {
    align-self: flex-start;
}
.message-avatar {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-round);
    background: linear-gradient(145deg, #7b61ff, #5a40e0);
    display: flex;
    align-items: center;
    justify-content: center;
}
.message-bubble {
    padding: 12px 16px;
    border-radius: var(--radius-medium);
    line-height: 1.6;
}
.message.user .message-bubble {
    background: var(--bg-bubble-user);
    color: white;
    border-top-right-radius: var(--radius-small);
}
.message.ai .message-bubble {
    background: var(--bg-bubble-ai);
    backdrop-filter: blur(6px);
    border-top-left-radius: var(--radius-small);
}
.input-bar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 16px;
    background: var(--bg-secondary);
    backdrop-filter: blur(18px);
    border-top: 1px solid var(--border-color);
}
.input-wrapper {
    flex: 1;
    background: rgba(255,255,255,0.12);
    border-radius: var(--radius-xlarge);
    padding: 8px 16px;
}
#messageInput {
    width: 100%;
    border: none;
    background: transparent;
    outline: none;
    font-size: 15px;
}
.send-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-round);
    border: none;
    background: linear-gradient(145deg, #7b61ff, #5a40e0);
    color: white;
}
</style>
</head>
<body>
<div id="app">
    <div class="top-nav">
        <div style="display:flex;gap:12px;align-items:center">
            <div class="logo-circle">🧠</div>
            <div class="ai-nickname">罗根AI</div>
        </div>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="chat-messages" id="messages"></div>
    </div>

    <div class="input-bar">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="和罗根AI聊天~">
        </div>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
// 自动适配你的域名，不用手动改地址！永久不用改
const BACKEND_API = window.location.origin + "/api/chat";
let chatHistory = [];

function addMsg(role, content) {
    const div = document.createElement('div')
    div.className = `message ${role}`
    div.innerHTML = `
        <div class="message-avatar">${role=='user'?'👤':'🧠'}</div>
        <div class="message-bubble"></div>
    `
    document.getElementById('messages').appendChild(div)
    document.getElementById('chatBox').scrollTop = 999999
    return div.querySelector(".message-bubble");
}

async function sendMessage() {
    const input = document.getElementById('messageInput')
    const text = input.value.trim()
    if(!text) return
    input.value = ""

    addMsg("user", text);
    chatHistory.push({role:"user", content:text});
    const aiBubble = addMsg("ai", "");

    try {
        const res = await fetch(BACKEND_API, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({messages:chatHistory})
        })

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = "";

        while(true){
            const {done,value} = await reader.read();
            if(done) break;
            const chunk = decoder.decode(value,{stream:true});
            const lines = chunk.split("\n\n").filter(l=>l.startsWith("data: ")&&l!="data: [DONE]");

            for(let line of lines){
                const json = JSON.parse(line.replace("data: ",""));
                full += json.content;
                aiBubble.innerText = full;
                document.getElementById('chatBox').scrollTop = 999999;
            }
        }
        chatHistory.push({role:"assistant",content:full})
    }catch(e){
        aiBubble.innerText="实时连接失败，请稍后重试"
    }
}

// 回车一键发送
document.getElementById('messageInput').onkeydown = e=>e.key=="Enter"&&sendMessage()
</script>
</body>
</html>
