<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗根专属豆包AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#f1f5ff;padding:15px;max-width:700px;margin:0 auto}
.title{text-align:center;color:#165DFF;font-size:24px;margin-bottom:15px}
.chat{height:75vh;border-radius:14px;background:#fff;padding:15px;overflow-y:auto;margin-bottom:12px}
.msg{max-width:75%;padding:10px 14px;border-radius:12px;margin-bottom:10px;line-height:1.5}
.you{background:#165DFF;color:#fff;margin-left:auto}
.ai{background:#e8f0ff;color:#1d2939;margin-right:auto}
.bottom{display:flex;gap:8px}
#txt{flex:1;padding:12px;border-radius:12px;border:1px solid #cce0ff}
#send,#clear{padding:12px 16px;background:#165DFF;color:white;border:none;border-radius:12px}
</style>
</head>
<body>
<h2 class="title">🤖 罗根私人豆包 2.0 Lite</h2>
<div class="chat" id="box"></div>

<div class="bottom">
<input type="text" id="txt" placeholder="发送消息...">
<button id="clear">清空对话</button>
<button id="send">发送</button>
</div>

<script>
const box = document.getElementById('box')
const txt = document.getElementById('txt')
const send = document.getElementById('send')
const clear = document.getElementById('clear')

async function talk(){
  let m = txt.value.trim()
  if(!m)return
  box.innerHTML += `<div class="msg you">${m}</div>`
  txt.value=''
  box.scrollTop=box.scrollHeight

  let res = await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:m})
  })
  let d = await res.json()
  box.innerHTML += `<div class="msg ai">${d.reply}</div>`
  box.scrollTop=box.scrollHeight
}

// 清空上下文
clear.onclick = async ()=>{
  await fetch('/api/clear',{method:'POST'})
  box.innerHTML=''
}

send.onclick=talk
txt.onkeydown=e=>e.key==='Enter'&&talk()
</script>
</body>
</html>
